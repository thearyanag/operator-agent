services:
  - type: worker
    name: operator-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: off
    disk:
      name: operator-agent-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PI_MODEL
        value: anthropic/claude-sonnet-4-5
      - key: ENABLE_TELEGRAM_NATIVE_STREAMING
        value: "true"
      - key: ENABLE_TELEGRAM_BUSINESS_AUTOMATION
        value: "true"
      - key: TELEGRAM_BUSINESS_DRY_RUN
        value: "false"
      - key: OPERATOR_STATE_DB_PATH
        value: /data/operator-state/operator.sqlite
      - key: DATABASE_URL
        sync: false
      - key: DD_API_KEY
        sync: false
      - key: DD_APP_KEY
        sync: false
      - key: DD_SITE
        value: datadoghq.com
